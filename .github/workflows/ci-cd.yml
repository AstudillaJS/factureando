name: CI/CD Pipeline

on:
  push:
    branches: [ develop, main, 'release/**', 'hotfix/**' ]
  pull_request:
    branches: [ develop, main ]

jobs:
  # ==========================================================================
  # 1. LINT Y VERIFICACION DE TIPOS
  # ==========================================================================
  lint:
    runs-on: windows-latest
    name: Lint & Type Check
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Run TypeScript type checking
      run: npm run lint
      continue-on-error: true

  # ==========================================================================
  # 2. BUILD Y PRUEBAS
  # ==========================================================================
  build:
    runs-on: windows-latest
    name: Build & Test
    needs: lint
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Build project
      run: npm run build
    
    - name: Check build output
      run: |
        if (!(Test-Path "dist")) {
          Write-Error "Build output directory not found"
          exit 1
        }

  # ==========================================================================
  # 3. ANALISIS DE DEPENDENCIAS
  # ==========================================================================
  security:
    runs-on: windows-latest
    name: Security Check
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Audit dependencies
      run: npm audit --audit-level=moderate
      continue-on-error: true
