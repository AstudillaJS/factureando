name: CI/CD Pipeline

on:
  push:
    branches: [ develop, main, 'release/**', 'hotfix/**' ]
  pull_request:
    branches: [ develop, main ]

jobs:
  # ==========================================================================
  # 1. LINT Y VERIFICACIÓN DE TIPOS
  # ==========================================================================
  lint:
    runs-on: windows-latest
    name: Lint & Type Check
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Run TypeScript type checking
      run: npm run lint
      continue-on-error: true

  # ==========================================================================
  # 2. BUILD Y PRUEBAS
  # ==========================================================================
  build:
    runs-on: windows-latest
    name: Build & Test
    needs: lint
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Build project
      run: npm run build
    
    - name: Check build output
      run: |
        if (!(Test-Path "dist")) {
          Write-Error "Build output directory not found"
          exit 1
        }

  # ==========================================================================
  # 3. ANÁLISIS DE DEPENDENCIAS
  # ==========================================================================
  security:
    runs-on: windows-latest
    name: Security Check
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Audit dependencies
      run: npm audit --audit-level=moderate
      continue-on-error: true

  # ==========================================================================
  # 4. RELEASE (solo en merge a main)
  # ==========================================================================
  release:
    runs-on: windows-latest
    name: Create Release
    needs: [lint, build, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    permissions:
      contents: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Get version from package.json
      id: version
      run: |
        $version = (Get-Content package.json | ConvertFrom-Json).version
        Write-Output "version=$version" >> $env:GITHUB_OUTPUT
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          dist/**
          package.json
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================================================
  # 5. NOTIFICACIÓN DE STATUS
  # ==========================================================================
  notify:
    runs-on: ubuntu-latest
    name: Notify Status
    needs: [lint, build, security]
    if: always()
    
    steps:
    - name: Check workflow status
      run: |
        if "${{ needs.lint.result }}" == "failure" || "${{ needs.build.result }}" == "failure"; then
          echo "❌ Pipeline failed"
          exit 1
        else
          echo "✅ Pipeline succeeded"
        fi
